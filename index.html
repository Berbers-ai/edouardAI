<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edouard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Cormorant+SC:wght@500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #EDE7DB;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 36px 48px;
    }
    header span {
      font-family: 'Cormorant SC', serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      color: #0D1B2A;
    }
    main {
      flex: 1;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 24px 80px;
    }
    .box {
      background: #FDFAF5;
      border-radius: 14px;
      border: 1px solid rgba(184,136,42,0.2);
      box-shadow: 0 4px 32px rgba(13,27,42,0.07);
      overflow: hidden;
    }
    textarea {
      width: 100%;
      padding: 28px 28px 20px;
      border: none;
      background: transparent;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 19px;
      color: #1C1A17;
      resize: none;
      line-height: 1.6;
      min-height: 120px;
    }
    textarea:focus { outline: none; }
    textarea::placeholder { color: #B8AA98; font-style: italic; }
    .box-footer {
      display: flex;
      justify-content: flex-end;
      padding: 14px 20px;
      border-top: 1px solid rgba(184,136,42,0.12);
    }
    button {
      background: #0D1B2A;
      color: #F7F3EC;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1a2d42; }
    button:disabled { opacity: 0.35; cursor: default; }
    #answer {
      margin-top: 40px;
      font-size: 19px;
      line-height: 1.8;
      color: #1C1A17;
      white-space: pre-wrap;
      display: none;
    }
    #answer.visible { display: block; animation: up 0.4s ease both; }
    @keyframes up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #B8882A; animation: bounce 1.2s ease-in-out infinite; margin: 0 2px; vertical-align: middle; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.5);opacity:0.3;} 40%{transform:scale(1.1);opacity:1;} }
  </style>
</head>
<body>

<header>
  <span>Edouard</span>
</header>

<main>
  <div class="box">
    <textarea id="q" placeholder="Stel een vraag over stijl…" rows="4"></textarea>
    <div class="box-footer">
      <button id="btn">Vraag stellen</button>
    </div>
  </div>
  <div id="answer"></div>
</main>

<script>
  var q = document.getElementById('q');
  var btn = document.getElementById('btn');
  var answer = document.getElementById('answer');

  q.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      ask();
    }
  });

  btn.addEventListener('click', function() {
    ask();
  });

  function ask() {
    var text = q.value.trim();
    if (!text) return;

    btn.disabled = true;
    answer.className = 'visible';
    answer.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/chat', true);
    xhr.setRequestHeader('Content-Type', 'application/json');

    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (data.reply) {
            answer.textContent = data.reply;
          } else {
            answer.textContent = 'Er ging iets mis. Probeer opnieuw.';
          }
        } catch(e) {
          answer.textContent = 'Er ging iets mis. Probeer opnieuw.';
        }
      } else {
        answer.textContent = 'Er ging iets mis. Probeer opnieuw.';
      }
      btn.disabled = false;
    };

    xhr.onerror = function() {
      answer.textContent = 'Er ging iets mis. Probeer opnieuw.';
      btn.disabled = false;
    };

    xhr.send(JSON.stringify({
      messages: [{ role: 'user', content: text }]
    }));
  }
</script>

</body>
</html>
